# k8s/overlays/aws/secret-store.yaml
#
# ClusterSecretStore: nguồn cluster-scoped để ESO lấy secret từ AWS.
#
# Vì sao ClusterSecretStore thay vì SecretStore?
# - SecretStore: namespace-scoped → mỗi namespace phải tạo lại
# - ClusterSecretStore: cluster-scoped → 1 lần khai báo, mọi namespace dùng
# - Phase 6 (observability) cũng cần đọc secrets → reuse luôn
#
# Auth flow:
# ┌──────────────────────────────────────────────────────────────┐
# │  ClusterSecretStore "aws-secrets-manager" (cluster-scoped)    │
# │  ─────────────────────────────────────────                    │
# │  provider: AWS Secrets Manager (ap-southeast-1)               │
# │  auth: serviceAccount ref → external-secrets:external-secrets │
# │                                       │                       │
# │                                       │ SA has IRSA annotation│
# │                                       │ → IAM Role with       │
# │                                       │   secretsmanager:Get  │
# │                                       │   permission          │
# │                                       ▼                       │
# │  ESO controller assumes role → fetches secret from AWS        │
# └──────────────────────────────────────────────────────────────┘

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  # Không có namespace vì là cluster-scoped resource
spec:
  provider:
    aws:
      # Service: SecretsManager (alternatives: ParameterStore, KMS)
      service: SecretsManager

      # Region của secret (phải match với region RDS)
      region: ap-southeast-1

      auth:
        # JWT-based auth qua ServiceAccount IRSA
        # ESO controller pod dùng SA này (đã có IRSA annotation từ addons.tf)
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets