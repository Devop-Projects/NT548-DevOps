# ============================================================================
# NetworkPolicy - Defense in Depth (Lớp 2)
# ============================================================================
# Lưu ý: kindnet KHÔNG enforce NetworkPolicy
# Policy này là DECLARATIVE DOCUMENTATION - sẽ enforce trên Calico/EKS
# ============================================================================

# ─── 1. DEFAULT DENY ALL ───
# Mọi pod trong namespace bị chặn ingress + egress mặc định
# Sau đó whitelist từng case cụ thể bên dưới
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: task-manager-dev
spec:
  podSelector: {}                      # Match TẤT CẢ pods
  policyTypes:
  - Ingress
  - Egress
  # Không có rules → block hết

---
# ─── 2. ALLOW DNS EGRESS (BẮT BUỘC!) ───
# Mọi pod cần resolve DNS (vd: "postgres" → IP)
# Không có rule này → app treo timeout
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: task-manager-dev
spec:
  podSelector: {}                      # Áp dụng cho mọi pod
  policyTypes: [Egress]
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP

---
# ─── 3. FRONTEND: Cho phép Ingress controller gọi vào ───
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-ingress
  namespace: task-manager-dev
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes: [Ingress]
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - port: 8080                        # Frontend container listen port 8080
      protocol: TCP

---
# ─── 4. BACKEND: Cho phép Ingress controller gọi vào ───
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-ingress
  namespace: task-manager-dev
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes: [Ingress]
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - port: 3000
      protocol: TCP

---
# ─── 5. BACKEND EGRESS: Chỉ cho phép gọi Postgres ───
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-egress-postgres
  namespace: task-manager-dev
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes: [Egress]
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - port: 5432
      protocol: TCP

---
# ─── 6. POSTGRES: Chỉ accept từ Backend ───
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-ingress
  namespace: task-manager-dev
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes: [Ingress]
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: backend
    ports:
    - port: 5432
      protocol: TCP

---
# ─── 7. (Optional) Allow Migration Job → Postgres ───
# Nếu db-migrate job có label app: db-migrate
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: migrate-egress-postgres
  namespace: task-manager-dev
spec:
  podSelector:
    matchLabels:
      app: db-migrate
  policyTypes: [Egress]
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - port: 5432
      protocol: TCP