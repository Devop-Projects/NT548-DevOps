apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ─── Default namespace cho mọi resource ───
namespace: task-manager-dev

# ─── Common labels (syntax MỚI - thay thế deprecated 'commonLabels') ───
labels:
- pairs:
    app.kubernetes.io/part-of: task-manager
    app.kubernetes.io/managed-by: kustomize
  includeSelectors: false   # Quan trọng! Không inject vào pod selector

# ─── Common annotations ───
commonAnnotations:
  thesis.author: "vantai-NT548"

# ─── Resources (1 file = 1 resource type) ───
resources:
# Governance layer
- namespace.yaml
- resourcequota.yaml
- limitrange.yaml

# Database layer
- postgres-statefulset.yaml
- postgres-services.yaml          # ← Headless + ClusterIP services

# Backend layer
- backend-deployment.yaml
- backend-service.yaml
- migrate-job.yaml

# Frontend layer
- frontend-deployment.yaml
- frontend-service.yaml

# Networking layer
- ingress.yaml
- rbac.yaml
- network-policies.yaml

# ─── ConfigMap Generator ───
# Tự động thêm hash vào tên (vd: backend-config-abc123)
# Khi config đổi → hash đổi → Pod tự rolling restart!
configMapGenerator:
- name: backend-config
  literals:
  - NODE_ENV=production
  - LOG_LEVEL=info
  - PORT=3000
  - JWT_EXPIRES_IN=7d
  - DB_POOL_MAX=10
  - DB_POOL_MIN=2
  - DB_HOST=postgres
  - DB_PORT=5432
  - DB_NAME=taskdb
  - DB_USER=taskuser

# ─── Image transformer ───
# Đổi tag dễ dàng: kustomize edit set image task-manager-backend:v0.2.0
images:
- name: task-manager-backend
  newTag: v0.1.3
- name: task-manager-frontend
  newTag: v0.1.0