# k8s/overlays/aws/kustomization.yaml.tpl
#
# ⭐ TEMPLATE — KHÔNG sửa file rendered (kustomization.yaml).
# Sửa file .tpl, rồi chạy `make k8s-render` để regenerate.
#
# Placeholders (envsubst sẽ thay):
#   devops-dev-db.chi0awig8v33.ap-southeast-1.rds.amazonaws.com    — từ rds output db_address
#   appdb         — từ rds output db_name
#   cbd8e8b       — git short SHA
#   doanvantai  — Docker Hub username

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: task-manager-dev

resources:
- ../../base
- secret-store.yaml
- external-secret.yaml
- ingress-alb.yaml

images:
- name: task-manager-backend
  newName: doanvantai/nt548-backend
  newTag: cbd8e8b
- name: task-manager-frontend
  newName: doanvantai/nt548-frontend
  newTag: cbd8e8b

configMapGenerator:
- name: backend-config
  behavior: merge
  literals:
  - DB_HOST=devops-dev-db.chi0awig8v33.ap-southeast-1.rds.amazonaws.com
  - DB_PORT=5432
  - DB_NAME=appdb
  - DB_USER=appuser
  - DB_SSL=true

patches:
- path: delete-nginx-ingress.yaml
- path: backend-deployment-patch.yaml
  target:
    kind: Deployment
    name: backend
- path: frontend-deployment-patch.yaml
  target:
    kind: Deployment
    name: frontend
- path: migrate-job-patch.yaml
  target:
    kind: Job
    name: db-migrate
- target:
    kind: StatefulSet
    name: postgres
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 0


labels:
- pairs:
    environment: aws-dev
    cloud: aws
  includeSelectors: false
