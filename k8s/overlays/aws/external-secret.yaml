# k8s/overlays/aws/external-secret.yaml
#
# ExternalSecret: định nghĩa "secret nào sync từ AWS → K8s".
#
# Data flow:
# ┌─────────────────────────────────────────────────────────────┐
# │  AWS Secrets Manager                                        │
# │  ────────────────────                                       │
# │  Secret: rds!db-ABCDEF12-... (auto-managed by RDS)          │
# │  Value (JSON): { "username": "appuser",                     │
# │                  "password": "auto-generated-strong-pwd" }  │
# └────────────────────────┬────────────────────────────────────┘
#                          │
#                          │ ESO reads every refreshInterval
#                          │
# ┌────────────────────────▼────────────────────────────────────┐
# │  K8s Secret: db-credentials (in task-manager-dev namespace) │
# │  ─────────────────────────────────                          │
# │  data:                                                      │
# │    DB_USERNAME: <base64 of "appuser">                       │
# │    DB_PASSWORD: <base64 of password>                        │
# └────────────────────────┬────────────────────────────────────┘
#                          │
#                          │ Pod mounts as env var
#                          ▼
#                  Backend reads DB_PASSWORD
#
# Vì sao refreshInterval = 1h?
# - RDS password rotation default 7 ngày (nếu enable)
# - 1h refresh = trade-off giữa API cost và freshness
# - Pod chỉ "thấy" password mới sau khi RESTART (env vars frozen ở pod start)
# - Production: dùng Reloader để auto-restart pod khi Secret change

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: task-manager-dev
spec:
  # Refresh mỗi 1 giờ — đủ cho rotation, không spam AWS API
  refreshInterval: 1h

  # Reference đến ClusterSecretStore đã tạo
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore   # Note: ClusterSecretStore, không phải SecretStore

  # Target K8s Secret sẽ được tạo
  target:
    name: db-credentials
    creationPolicy: Owner      # ESO own secret này — delete ES → delete Secret
    # Alternative: 'Merge' nếu muốn ES chỉ thêm key, không own

  # Map AWS secret JSON keys → K8s Secret keys
  data:
    - secretKey: DB_USERNAME
      remoteRef:
        # ⚠️ Thay bằng SECRET_KEY của bạn (output từ command ở trên)
        key: rds!db-f0804f0d-0d06-424d-8702-fe8bf4bc876d
        property: username    # JSON key trong AWS secret

    - secretKey: DB_PASSWORD
      remoteRef:
        key: rds!db-f0804f0d-0d06-424d-8702-fe8bf4bc876d
        property: password