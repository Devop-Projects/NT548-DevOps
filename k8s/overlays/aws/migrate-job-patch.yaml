# k8s/overlays/aws/migrate-job-patch.yaml
#
# Override migration Job cho AWS deployment:
# 1. Image: local → Docker Hub
# 2. Secret: postgres-secrets → db-credentials (ESO-synced)
# 3. Thêm DB_USER từ Secret (Single Source of Truth)

apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: task-manager-dev
spec:
  template:
    spec:
      containers:
      - name: migrate
        image: doanvantai/nt548-backend:e4194db
        imagePullPolicy: IfNotPresent
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_PASSWORD
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_USERNAME
