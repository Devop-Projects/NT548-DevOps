apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: task-manager
  namespace: dev
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Chỉ rewrite những gì bắt đầu bằng /api
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - host: taskmanager.local
    http:
      paths:
      - path: /api(/|$)(.*) # Group 2 ($2) là phần sau /api
        pathType: ImplementationSpecific
        backend:
          service:
            name: backend
            port:
              number: 3000
      - path: /()(.*)      # Group 2 ($2) ở đây là chính nó, không làm hỏng path Frontend
        pathType: ImplementationSpecific
        backend:
          service:
            name: frontend
            port:
              number: 80