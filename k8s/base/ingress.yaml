apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: task-manager
  namespace: task-manager-dev
  annotations:
    # Bỏ rewrite-target và use-regex - không cần nữa
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: taskmanager.local
    http:
      paths:
      # Backend: pass-through, giữ nguyên /api/*
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 3000
      # Frontend: catch-all
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80