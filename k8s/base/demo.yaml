apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: backend
        image: task-manager-backend:v0.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: NODE_ENV
          value: production
        - name: DATABASE_URL
          value: "postgres://taskuser:password@postgres:5432/taskdb"
          #                                    ↑
          #                                    Tên Service! K8s DNS resolve.
        - name: JWT_SECRET
          value: "TEMPORARY-SECRET-CHANGE-AT-LESSON-3-5-32CHARSREQUIRED"
        - name: JWT_EXPIRES_IN
          value: "7d"
        resources:
          requests: {cpu: 100m, memory: 128Mi}
          limits: {cpu: 500m, memory: 256Mi}
        livenessProbe:
          httpGet: {path: /health/live, port: http}
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet: {path: /health/ready, port: http}
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
  - name: http
    port: 3000               # Port Service (giống Phase 2 dùng :3000)
    targetPort: http         # Match container port name