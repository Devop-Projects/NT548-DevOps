apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: dev
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: db-migrate
    spec:
      restartPolicy: OnFailure
      containers:
      - name: migrate
        image: task-manager-backend:v0.1.3
        imagePullPolicy: IfNotPresent
        command: ["node", "src/scripts/migrate.js"]

        # Same config pattern as backend deployment
        envFrom:
        - configMapRef:
            name: backend-config
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: JWT_SECRET