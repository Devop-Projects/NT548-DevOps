apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: task-manager-dev
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: task-manager

spec:
  replicas: 3

  selector:
    matchLabels:
      app: backend

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  revisionHistoryLimit: 5

  template:
    metadata:
      labels:
        app: backend
        version: v0.1.0
    spec:
      terminationGracePeriodSeconds: 30
      
      containers:
      - name: backend
        image: task-manager-backend:v0.1.0
        imagePullPolicy: IfNotPresent
        
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP

        env:
        - name: PORT
          value: "3000"
        - name: NODE_ENV
          value: "development"
        - name: LOG_LEVEL
          value: "info"
        - name: DATABASE_URL
          value: "postgres://taskuser:password@postgres:5432/taskdb"
        - name: JWT_SECRET
          value: "temporary-dev-secret-do-not-use-in-prod"
        - name: JWT_EXPIRES_IN
          value: "7d"

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi