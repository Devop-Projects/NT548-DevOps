apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: task-manager-dev
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: task-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  revisionHistoryLimit: 5
  template:
    metadata:
      labels:
        app: backend
        version: v0.1.0
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: backend
        image: task-manager-backend:v0.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3000
        # ─── Inject từ ConfigMap + Secret ───
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secrets
        resources:
          requests: {cpu: 100m, memory: 128Mi}
          limits: {cpu: 500m, memory: 256Mi}
        livenessProbe:
          httpGet: {path: /health/live, port: http}
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet: {path: /health/ready, port: http}
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: task-manager-dev
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
  - name: http
    port: 3000
    targetPort: http