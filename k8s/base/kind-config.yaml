kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: task-cluster
nodes:
- role: control-plane
  # Expose port để Ingress sau này
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  extraPortMappings:
  - containerPort: 80
    hostPort: 8081
    protocol: TCP
  - containerPort: 443
    hostPort: 8443
    protocol: TCP
- role: worker
- role: worker