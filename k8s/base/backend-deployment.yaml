apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: dev
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: task-manager
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  revisionHistoryLimit: 5
  template:
    metadata:
      labels:
        app: backend
        version: v0.1.3
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: backend
        image: task-manager-backend:v0.1.3
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3000

        # ─── ConfigMap: non-sensitive config ───
        envFrom:
        - configMapRef:
            name: backend-config

        # ─── Secrets: sensitive values ───
        # Pattern: Single Source of Truth
        # POSTGRES_PASSWORD comes from postgres-secrets (same as Postgres pod)
        # JWT_SECRET comes from backend-secrets (app-specific)
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: JWT_SECRET

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: dev
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
  - name: http
    port: 3000
    targetPort: http