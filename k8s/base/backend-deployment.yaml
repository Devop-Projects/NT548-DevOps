apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: dev
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: task-manager
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  revisionHistoryLimit: 5
  template:
    metadata:
      labels:
        app: backend
        version: v0.1.0
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: backend
        image: task-manager-backend:v0.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3000
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secrets       
        # env:
        # - name: PORT
        #   value: "3000"
        # - name: NODE_ENV
        #   value: "production"
        # - name: LOG_LEVEL
        #   value: "info"
        # # Tạm thời inline — sẽ chuyển sang ConfigMap/Secret ở 3.5
        # - name: DATABASE_URL
        #   value: "postgres://taskuser:password@postgres:5432/taskdb"
        # - name: JWT_SECRET
        #   value: "TEMPORARY-DEV-SECRET-DO-NOT-USE-IN-PRODUCTION-32CHARS"
        # - name: JWT_EXPIRES_IN
          # value: "7d"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        # Health probes — cần Service postgres trước thì readiness mới pass
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: dev
spec:
  type: ClusterIP
  internalTrafficPolicy: Local
  selector:
    app: backend
  ports:
  - name: http
    port: 3000
    targetPort: http