# ─── Headless Service ───
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: task-manager-dev
  labels:
    app: postgres
spec:
  clusterIP: None              # ← Headless
  selector:
    app: postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432

---
# ─── ClusterIP Service (cho app dễ connect) ───
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: task-manager-dev
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432

---
# ─── StatefulSet ───
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: task-manager-dev
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: task-manager
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  
  template:
    metadata:
      labels:
        app: postgres
    spec:
      terminationGracePeriodSeconds: 60   # DB cần thời gian flush
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - name: postgres
          containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: taskdb
        - name: POSTGRES_USER
          value: taskuser
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_PASSWORD
        # PGDATA trong subdir để tránh lost+found issue
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        
        resources:
          requests: {cpu: 200m, memory: 256Mi}
          limits: {cpu: 1000m, memory: 1Gi}
        
        # ─── PROBES ───
        # Startup: cho Postgres khởi động (slow init khi PVC mới)
        startupProbe:
          exec:
            command: ["pg_isready", "-U", "taskuser", "-d", "taskdb"]
          periodSeconds: 10
          failureThreshold: 30        # 30 × 10s = 5 phút
        
        # Liveness: process alive (postgres) — không check DB query
        # Vì Postgres bị stuck thì query đơn giản cũng treo
        # Tip: dùng pg_isready (chỉ ping process), KHÔNG dùng `psql -c "SELECT 1"`
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "taskuser"]
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        
        # Readiness: cùng pg_isready (DB sẵn sàng accept connection)
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "taskuser", "-d", "taskdb"]
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
  
  # ─── PVC TEMPLATE ───
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ReadWriteOnce]
      storageClassName: standard      # Default StorageClass của kind
      resources:
        requests:
          storage: 5Gi