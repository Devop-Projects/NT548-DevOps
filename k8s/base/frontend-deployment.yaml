apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: task-manager
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # ─── RBAC ───
      serviceAccountName: frontend-sa
      automountServiceAccountToken: false

      # ─── Pod-level Security Context ───
      # nginx Alpine có user UID=101, GID=101
      securityContext:
        runAsNonRoot: true
        runAsUser: 101              # nginx user
        runAsGroup: 101
        fsGroup: 101

      containers:
      - name: frontend
        image: task-manager-frontend:v0.1.0 
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080       # Non-root → port > 1024

        # ─── Container-level Security Context ───
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true       # Filesystem read-only
          capabilities:
            drop: ["ALL"]                     # nginx KHÔNG cần caps khi bind > 1024
          seccompProfile:
            type: RuntimeDefault

        # ─── Volume mounts cho nginx writable dirs ───
        # nginx cần ghi vào các dir này lúc runtime
        volumeMounts:
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
        - name: tmp
          mountPath: /tmp

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

        # ─── PROBES ───
        livenessProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 10
          failureThreshold: 2

      # ─── Volumes (writable areas cho read-only fs) ───
      volumes:
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
      - name: tmp
        emptyDir: {}