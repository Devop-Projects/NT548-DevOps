# sonar-project.properties
# SonarCloud configuration cho NT548 Task Manager

# ─── Project identifier (phải khớp với SonarCloud) ───
sonar.projectKey=nt548-devops
sonar.organization=devop-projects-task-manager

# ─── Project metadata ───
sonar.projectName=NT548 Task Manager
sonar.projectVersion=1.0

# ─── Source code paths ───
sonar.sources=app/mono/backend/src,app/mono/frontend/src
sonar.tests=app/mono/backend/tests,app/mono/frontend/src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx

# ─── Coverage reports (Jest và Vitest đã sinh sẵn lcov.info) ───
sonar.javascript.lcov.reportPaths=app/mono/backend/coverage/lcov.info,app/mono/frontend/coverage/lcov.info

# ─── Exclusions (không scan các file này) ───
sonar.exclusions=**/node_modules/**,**/*.test.js,**/*.test.jsx,**/coverage/**,**/dist/**,**/build/**

# ─── Encoding ───
sonar.sourceEncoding=UTF-8