# =============================================================================
# .github/workflows/ci.yml
# =============================================================================
# CI Pipeline cho NT548 Task Manager App
#
# Architecture:
#   Stage 1 (parallel): backend-test, frontend-test, sca-scan
#   Stage 2 (after test): sast-scan (cần coverage từ tests)
#   Stage 3 (after test): build-backend, build-frontend (build + image scan)
#   Stage 4: Push to Docker Hub (chỉ trên main)
#
# Security: 3 lớp scan (SAST + SCA + Image scan) → defense in depth
# =============================================================================

name: CI

# ─── Triggers ───────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop, vantai]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  workflow_dispatch:    # cho phép trigger manual từ UI

# ─── Concurrency: hủy run cũ khi có commit mới trên cùng branch ──────────────
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─── Global env (single source of truth) ────────────────────────────────────
env:
  # Fallback to '20' nếu GitHub Variable chưa set
  NODE_VERSION: ${{ vars.NODE_VERSION || '20' }}

# =============================================================================
# JOBS
# =============================================================================
jobs:

  # ===========================================================================
  # JOB 1: Backend lint + test
  # ===========================================================================
  backend-test:
    name: Backend lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./app/mono/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/mono/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Jest tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-not-used-in-prod
          JWT_EXPIRES_IN: 1h
          DATABASE_URL: postgres://fake:fake@localhost:5432/fake
          PORT: 3000

      - name: Upload backend coverage
        if: always()    # upload kể cả khi test fail
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: app/mono/backend/coverage/
          retention-days: 7

  # ===========================================================================
  # JOB 2: Frontend lint + test
  # ===========================================================================
  frontend-test:
    name: Frontend lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./app/mono/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/mono/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: app/mono/frontend/coverage/
          retention-days: 7

  # ===========================================================================
  # JOB 3: SCA - Trivy filesystem scan (chạy parallel với tests)
  # ===========================================================================
  # Quét CVE trong dependencies (package-lock.json) + secrets + misconfig
  # Không cần build → chạy nhanh (~30s)
  # ===========================================================================
  sca-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read
      security-events: write    # Cần để upload SARIF lên GitHub Security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'    # Report-only mode (chưa block pipeline)

      - name: Upload Trivy fs SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-fs'

  # ===========================================================================
  # JOB 4: SAST - SonarCloud scan (cần coverage từ test jobs)
  # ===========================================================================
  # Phân tích code quality: bugs, vulnerabilities, code smells, coverage
  # Phụ thuộc: backend-test + frontend-test (cần lcov.info)
  # ===========================================================================
  sast-scan:
    name: SonarCloud SAST scan
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Full git history để analyze blame

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: app/mono/backend/coverage/

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: app/mono/frontend/coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: 'https://sonarcloud.io'

  # ===========================================================================
  # JOB 5: Build backend image + Trivy image scan + Push
  # ===========================================================================
  build-backend:
    name: Build backend image
    needs: backend-test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write
      security-events: write    # Upload Trivy image SARIF

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── STEP 1: Build LOCAL image (chưa push) để scan ───
      - name: Build image (local, for scanning)
        uses: docker/build-push-action@v5
        with:
          context: ./app/mono/backend
          file: ./app/mono/backend/Dockerfile
          push: false
          tags: nt548-backend:scan    # Tag tạm để scan
          load: true                   # Load vào local Docker daemon
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── STEP 2: Scan image với Trivy ───
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'nt548-backend:scan'
          format: 'sarif'
          output: 'trivy-image-backend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'    # Report-only

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image-backend.sarif'
          category: 'trivy-image-backend'

      # ─── STEP 3: Login Docker Hub (chỉ trên main) ───
      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ─── STEP 4: Generate multi-tag metadata ───
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/nt548-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      # ─── STEP 5: Push image (chỉ trên main, tận dụng cache) ───
      - name: Push image with multiple tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./app/mono/backend
          file: ./app/mono/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha    # Reuse cache → build nhanh ~10s

  # ===========================================================================
  # JOB 6: Build frontend image + Trivy image scan + Push
  # ===========================================================================
  build-frontend:
    name: Build frontend image
    needs: frontend-test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── STEP 1: Build LOCAL image để scan ───
      - name: Build image (local, for scanning)
        uses: docker/build-push-action@v5
        with:
          context: ./app/mono/frontend
          file: ./app/mono/frontend/Dockerfile
          push: false
          tags: nt548-frontend:scan
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=/api

      # ─── STEP 2: Scan image với Trivy ───
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'nt548-frontend:scan'
          format: 'sarif'
          output: 'trivy-image-frontend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image-frontend.sarif'
          category: 'trivy-image-frontend'

      # ─── STEP 3: Login Docker Hub (chỉ trên main) ───
      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ─── STEP 4: Generate multi-tag metadata ───
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/nt548-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      # ─── STEP 5: Push image (chỉ trên main) ───
      - name: Push image with multiple tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./app/mono/frontend
          file: ./app/mono/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          build-args: |
            VITE_API_URL=/api
            
  # ===========================================================================
  # JOB: Secret scan với Gitleaks
  # ===========================================================================
  # Quét git history để tìm credentials bị leak (AWS keys, JWT, SSH keys, ...)
  # ===========================================================================
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_linux_x64.tar.gz
          tar -xzf gitleaks_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks scan
        run: |
          gitleaks detect --source . --verbose --redact