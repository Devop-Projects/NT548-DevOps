# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, develop, vantai]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─── Định nghĩa env chung ───────────────────────────────────
env:
  NODE_VERSION: ${{vars.NODE_VERSION}}    # Single source of truth cho Node version

jobs:
  # ─── Job 1: Backend lint + test ────────────────────────────
  backend-test:
    name: Backend lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./app/mono/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/mono/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Jest tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-not-used-in-prod
          JWT_EXPIRES_IN: 1h
          DATABASE_URL: postgres://fake:fake@localhost:5432/fake
          PORT: 3000

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: app/mono/backend/coverage/
          retention-days: 7

  # ─── Job 2: Frontend lint + test ───────────────────────────
  frontend-test:
    name: Frontend lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./app/mono/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/mono/frontend/package-lock.json

      - run: npm ci

      - run: npm test
# ─── Job 3: Build backend Docker image ────────────────────
  build-backend:
    name: Build backend image
    needs: backend-test                 # chỉ build khi test pass
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # Setup Buildx — Docker BuildKit, hỗ trợ caching tiên tiến
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login Docker Hub
      - name: Login to Docker Hub
        # Chỉ login + push trên main (không push trên PR)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Sinh tags + labels tự động
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/nt548-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      # Build + push (push chỉ trên main)
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app/mono/backend
          file: ./app/mono/backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers giữa các run → build nhanh hơn
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 4: Build frontend Docker image ───────────────────
  build-frontend:
    name: Build frontend image
    needs: frontend-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/nt548-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=ref,event=branch

      - uses: docker/build-push-action@v5
        with:
          context: ./app/mono/frontend
          file: ./app/mono/frontend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=/api
  # ─── Job: SCA với Trivy filesystem scan ────────────────────
  sca-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Permissions cần thiết để upload SARIF lên GitHub Security tab
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'                  # Scan toàn bộ repo
          format: 'sarif'                # Format chuẩn cho GitHub
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'      # Chỉ quan tâm CRITICAL/HIGH
          exit-code: '0'                  # Report-only (chưa block pipeline)

      - name: Upload Trivy SARIF report
        if: always()                      # Upload kể cả khi scan có lỗi
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-fs'