# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, develop, vantai]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─── Định nghĩa env chung ───────────────────────────────────
env:
  NODE_VERSION: ${{vars.NODE_VERSION}}    # Single source of truth cho Node version

jobs:
  # ─── Job 1: Backend lint + test ────────────────────────────
  backend-test:
    name: Backend lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./app/mono/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/mono/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Jest tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-not-used-in-prod
          JWT_EXPIRES_IN: 1h
          DATABASE_URL: postgres://fake:fake@localhost:5432/fake
          PORT: 3000

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: app/mono/backend/coverage/
          retention-days: 7

  # ─── Job 2: Frontend lint + test ───────────────────────────
  frontend-test:
    name: Frontend lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./app/mono/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/mono/frontend/package-lock.json

      - run: npm ci

      - run: npm test
        
       # ← THÊM: Upload frontend coverage để sast-scan dùng
      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: app/mono/frontend/coverage/
          retention-days: 7

# ─── Job 3: Build backend Docker image ────────────────────
  # ─── Job: Build backend image với security scan ────────────
  build-backend:
    name: Build backend image
    needs: backend-test                  # chỉ build khi test pass
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      security-events: write             # ← THÊM: cho upload SARIF

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── STEP 1: Build LOCAL image (chưa push) ───
      - name: Build image (local, for scanning)
        uses: docker/build-push-action@v5
        with:
          context: ./app/mono/backend
          file: ./app/mono/backend/Dockerfile
          push: false                    # KHÔNG push, chỉ build local
          tags: nt548-backend:scan       # Tag tạm để scan
          load: true                     # Load vào local Docker daemon
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── STEP 2: Scan image với Trivy ───
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: 'nt548-backend:scan'
          format: 'sarif'
          output: 'trivy-image-backend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'                 # Report-only (giai đoạn đầu)

      # ─── STEP 3: Upload SARIF lên GitHub Security ───
      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image-backend.sarif'
          category: 'trivy-image-backend'

      # ─── STEP 4: Login Docker Hub (chỉ trên main) ───
      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ─── STEP 5: Generate multi-tag metadata ───
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/nt548-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      # ─── STEP 6: Push image (chỉ trên main, sau khi scan OK) ───
      - name: Push image with multiple tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./app/mono/backend
          file: ./app/mono/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha             # Reuse cache → build nhanh

  # ─── Job 4: Build frontend Docker image ───────────────────
  build-frontend:
    name: Build frontend image
    needs: frontend-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/nt548-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=ref,event=branch

      - uses: docker/build-push-action@v5
        with:
          context: ./app/mono/frontend
          file: ./app/mono/frontend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=/api
  # ─── Job: SCA với Trivy filesystem scan ────────────────────
  sca-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Permissions cần thiết để upload SARIF lên GitHub Security tab
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'                  # Scan toàn bộ repo
          format: 'sarif'                # Format chuẩn cho GitHub
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'      # Chỉ quan tâm CRITICAL/HIGH
          exit-code: '0'                  # Report-only (chưa block pipeline)

      - name: Upload Trivy SARIF report
        if: always()                      # Upload kể cả khi scan có lỗi
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-fs'

  # ─── Job: SAST với SonarCloud ──────────────────────────────
  sast-scan:
    name: SonarCloud SAST scan
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]   # cần coverage từ test jobs
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # SonarCloud cần full git history để analyze blame
          fetch-depth: 0

      # Download coverage artifacts từ test jobs
      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: app/mono/backend/coverage/

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: app/mono/frontend/coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}    # GitHub auto-provide
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}